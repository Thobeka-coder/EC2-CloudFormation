name: Deploy EC2 CloudFormation Stack

on:
  push:
    branches: [ main ]          # Deploy on push to main
  workflow_dispatch:            # Also allow manual runs from the Actions tab

permissions:
  id-token: write               # Required for OIDC
  contents: read

env:
  AWS_REGION: us-east-1
  STACK_NAME: my-ec2-stack
  TEMPLATE: templates/ec2-instance.yaml

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::<ACCOUNT_ID>:role/<YOUR_ROLE_NAME>
          aws-region: ${{ env.AWS_REGION }}

      # --- Alternative: access keys instead of OIDC ---
      # - name: Configure AWS credentials (access keys)
      #   uses: aws-actions/configure-aws-credentials@v4
      #   with:
      #     aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
      #     aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      #     aws-region: ${{ env.AWS_REGION }}

      - name: Validate template
        run: |
          aws cloudformation validate-template \
            --template-body file://${{ env.TEMPLATE }} \
            --region ${{ env.AWS_REGION }}

      - name: Deploy stack
        run: |
          aws cloudformation deploy \
            --stack-name ${{ env.STACK_NAME }} \
            --template-file ${{ env.TEMPLATE }} \
            --region ${{ env.AWS_REGION }} \
            --parameter-overrides \
                KeyName=${{ secrets.KEY_NAME }} \
                VpcId=${{ secrets.VPC_ID }} \
                SubnetId=${{ secrets.SUBNET_ID }} \
            --no-fail-on-empty-changeset

      - name: Show stack outputs
        run: |
          aws cloudformation describe-stacks \
            --stack-name ${{ env.STACK_NAME }} \
            --region ${{ env.AWS_REGION }} \
            --query "Stacks[0].Outputs" \
            --output table
